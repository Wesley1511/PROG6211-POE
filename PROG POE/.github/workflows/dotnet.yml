name: .NET 10 CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --configuration Release --no-restore

      - name: Run tests if present
        shell: bash
        run: |
          # run tests only if there are test projects in the repo
          if ls **/*[Tt]est*.csproj 1> /dev/null 2>&1; then
            dotnet test --no-build --verbosity normal
          else
            echo "No test projects found, skipping dotnet test"
          fi

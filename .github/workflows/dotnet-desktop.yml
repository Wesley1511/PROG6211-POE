name: .NET Build & Test

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build-and-test:
    runs-on: windows-latest

    steps:
      # Step 1: Checkout repository
      - name: Checkout repository
        uses: actions/checkout@v3

      # Step 2: Setup .NET SDK
      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v3
        with:
          dotnet-version: 7.0.x  # Use your target .NET version

      # Step 3: Restore dependencies for the main project
      - name: Restore Main Project
        run: dotnet restore "PROG POE/PROG POE.csproj"

      # Step 4: Build the main project
      - name: Build Main Project
        run: dotnet build "PROG POE/PROG POE.csproj" --configuration Release --no-restore

      # Step 5: Restore dependencies for the test project
      - name: Restore Test Project
        run: dotnet restore "PROGPOETEST/PROGPOETEST.csproj"

      # Step 6: Build the test project
      - name: Build Test Project
        run: dotnet build "PROGPOETEST/PROGPOETEST.csproj" --configuration Release --no-restore

      # Step 7: Run tests
      - name: Run Tests
        run: dotnet test "PROGPOETEST/PROGPOETEST.csproj" --configuration Release --no-build --verbosity normal